# grafic.admsr.ru — статика (dist) + API (Node :3001)
# Путь к проекту: /var/www/grafic.admsr.ru/html

server {
    listen 443 ssl;
    server_name grafic.admsr.ru;

    root /var/www/grafic.admsr.ru/html/dist;
    index index.html;
    client_max_body_size 140M;

    # Скопируйте пути с рабочего vhost на этом же сервере (НЕ плейсхолдеры):
    #   grep -h ssl_certificate /etc/nginx/sites-enabled/* 2>/dev/null | sort -u
    # Пример (замените на свои файлы):
    # ssl_certificate     /etc/letsencrypt/live/grafic.admsr.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/grafic.admsr.ru/privkey.pem;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
